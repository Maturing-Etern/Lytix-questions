<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lytix Viewer — .lytix File Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black: #000; --card: #0d0d0d; --line: rgba(255,255,255,0.10);
      --text: #f5f5f5; --sub: #999; --muted: #555;
      --mono: 'JetBrains Mono','Fira Code','Consolas',monospace;
      --serif: 'Times New Roman','Noto Serif SC',serif;
      --radius: 4px;
    }
    *,*::after,*::before { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family: 'Inter','PingFang SC',system-ui,sans-serif;
      background: #000; color: var(--text); line-height:1.6;
      min-height:100vh; -webkit-font-smoothing:antialiased;
    }
    .container { max-width:820px; margin:0 auto; padding:0 28px; }

    /* Header */
    .header {
      text-align:center; padding:64px 24px 40px;
      border-bottom:1px solid var(--line);
    }
    .header-math { font-family:var(--serif); font-style:italic; font-size:4rem; color:var(--text); margin-bottom:8px; user-select:none; }
    .header h1 { font-family:var(--serif); font-size:2rem; font-weight:400; letter-spacing:0.06em; margin-bottom:8px; }
    .header .label { font-family:var(--mono); font-size:0.68rem; letter-spacing:0.18em; color:var(--muted); }

    /* Drop zone */
    .drop-zone {
      margin:40px auto; max-width:480px;
      border:1px dashed var(--line); padding:48px 24px;
      text-align:center; cursor:pointer; position:relative;
      transition:border-color .15s;
    }
    .drop-zone.drag-over { border-color:#fff; background:rgba(255,255,255,0.02); }
    .drop-zone input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; }
    .drop-icon { font-family:var(--mono); font-size:0.72rem; color:var(--muted); margin-bottom:8px; }
    .drop-text { font-family:var(--mono); font-size:0.82rem; color:var(--sub); }
    .drop-hint { font-family:var(--mono); font-size:0.64rem; color:var(--muted); margin-top:8px; }

    /* Results */
    #result { display:none; padding-bottom:80px; }
    .meta-row {
      display:grid; grid-template-columns:1fr 1fr; gap:1px;
      background:var(--line); margin-bottom:40px;
    }
    .meta-cell {
      background:var(--card); padding:14px 20px;
      font-family:var(--mono); font-size:0.75rem;
    }
    .meta-key { color:var(--muted); margin-bottom:4px; }
    .meta-val { color:var(--sub); }

    .section {
      margin-bottom:40px;
      padding-bottom:40px;
      border-bottom:1px solid var(--line);
    }
    .section-title {
      font-family:var(--mono); font-size:0.68rem; font-weight:600;
      letter-spacing:0.18em; color:var(--muted); margin-bottom:24px;
      text-transform:uppercase;
    }
    .q-block { margin-bottom:28px; }
    .q-block:last-child { margin-bottom:0; }
    .q-text { font-size:0.9rem; font-weight:500; margin-bottom:10px; }
    .q-answer {
      font-family:var(--mono); font-size:0.82rem; color:var(--sub);
      background:var(--card); padding:10px 14px;
      border:1px solid var(--line); white-space:pre-wrap; word-break:break-word;
    }
    .q-answer.multi { padding:0; }
    .q-answer.multi .item {
      padding:8px 14px; border-bottom:1px solid var(--line);
    }
    .q-answer.multi .item:last-child { border-bottom:none; }

    /* Files */
    .file-grid {
      display:grid; grid-template-columns:1fr 1fr; gap:16px;
    }
    .file-card {
      background:var(--card); border:1px solid var(--line);
      padding:12px; font-family:var(--mono); font-size:0.72rem;
    }
    .file-name { color:var(--sub); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .file-size { color:var(--muted); }
    .file-preview {
      margin-top:8px; max-width:100%; max-height:240px;
      object-fit:contain; background:#111;
    }

    .footer { padding:32px; text-align:center; font-family:var(--mono); font-size:0.64rem; color:var(--muted); border-top:1px solid var(--line); }
  </style>
</head>
<body>

<div class="header">
  <div class="header-math">∫</div>
  <h1>Lytix Viewer</h1>
  <p class="label">.lytix file reader</p>
</div>

<div class="container">

  <!-- Drop zone -->
  <div class="drop-zone" id="drop-zone">
    <div class="drop-icon">[ OPEN ]</div>
    <div class="drop-text">拖拽 .lytix 文件到此处，或点击选择</div>
    <div class="drop-hint">仅支持 Lytix 提交打包格式 (.lytix)</div>
    <input type="file" id="file-input" accept=".lytix" />
  </div>

  <!-- Result -->
  <div id="result"></div>

</div>

<div class="footer">
  <p>lytix.file.viewer / v1.0</p>
</div>

<script>
"use strict";

const dropZone = document.getElementById("drop-zone");
const fileInput = document.getElementById("file-input");
const resultEl = document.getElementById("result");

// ── Drag / Drop / Click ─────────────────────────────
dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
dropZone.addEventListener("drop", e => {
  e.preventDefault(); dropZone.classList.remove("drag-over");
  const f = e.dataTransfer.files[0];
  if (f) loadFile(f);
});

fileInput.addEventListener("change", () => {
  if (fileInput.files[0]) loadFile(fileInput.files[0]);
});

// ── Parse .lytix ────────────────────────────────────
function loadFile(file) {
  const reader = new FileReader();
  reader.onerror = () => showError("文件读取失败");
  reader.onload = function(e) {
    try {
      const bytes = new Uint8Array(e.target.result);
      const data = parseLytix(bytes);
      renderResult(data);
    } catch (err) {
      showError("解析失败：" + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function parseLytix(bytes) {
  if (bytes.length < 12) throw new Error("文件过短，不是有效的 .lytix 格式");

  // Read header
  const view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
  const magic = view.getUint32(0, true);
  if (magic !== 0x4C595458) throw new Error("无效的 .lytix 文件（魔数不匹配）");

  const version = view.getUint32(4, true);
  const jsonLen = view.getUint32(8, true);

  if (12 + jsonLen > bytes.length) throw new Error("文件截断，JSON 数据不完整");

  // Decode JSON
  const jsonSlice = bytes.slice(12, 12 + jsonLen);
  const decoder = new TextDecoder();
  const jsonStr = decoder.decode(jsonSlice);

  return JSON.parse(jsonStr);
}

function showError(msg) {
  resultEl.style.display = "none";
  dropZone.style.display = "block";
  const hint = dropZone.querySelector(".drop-hint");
  hint.textContent = "⚠ " + msg;
  hint.style.color = "#f44";
  setTimeout(() => { hint.textContent = "仅支持 Lytix 提交打包格式 (.lytix)"; hint.style.color = ""; }, 4000);
}

// ── Render ──────────────────────────────────────────
function renderResult(data) {
  dropZone.style.display = "none";
  resultEl.style.display = "block";
  resultEl.innerHTML = "";

  // Meta grid
  const meta = data._meta || {};
  const app = data.applicant || {};

  const metaGrid = document.createElement("div");
  metaGrid.className = "meta-row";
  metaGrid.innerHTML = `
    <div class="meta-cell"><div class="meta-key">岗位</div><div class="meta-val">${esc(meta.position||"—")}</div></div>
    <div class="meta-cell"><div class="meta-key">提交时间</div><div class="meta-val">${esc(formatTime(meta.submittedAt))}</div></div>
    <div class="meta-cell"><div class="meta-key">申请人</div><div class="meta-val">${esc(app.name||"—")}</div></div>
    <div class="meta-cell"><div class="meta-key">联系方式</div><div class="meta-val">${esc(app.contact||"—")}</div></div>
  `;
  resultEl.appendChild(metaGrid);

  // Remark if any
  if (app.remark) {
    const rm = document.createElement("div");
    rm.className = "section";
    rm.innerHTML = `<div class="section-title">§ 备注</div><div class="q-answer">${esc(app.remark)}</div>`;
    resultEl.appendChild(rm);
  }

  // Question answers (grouped by position)
  const posId = meta.positionId;
  const qs = window.QUESTIONS && QUESTIONS[posId];
  if (qs) {
    qs.sections.forEach(section => {
      const sec = document.createElement("div");
      sec.className = "section";

      const title = document.createElement("div");
      title.className = "section-title";
      title.textContent = "§ " + section.title;
      sec.appendChild(title);

      section.questions.forEach(q => {
        const val = data[q.id];
        const block = document.createElement("div");
        block.className = "q-block";

        const label = document.createElement("div");
        label.className = "q-text";
        label.textContent = q.text;
        block.appendChild(label);

        if (q.type === "upload") {
          const files = data._files && data._files[q.id];
          if (files && files.length) {
            const grid = document.createElement("div");
            grid.className = "file-grid";
            files.forEach(f => {
              const card = document.createElement("div");
              card.className = "file-card";
              card.innerHTML = `<div class="file-name">${esc(f.name)}</div><div class="file-size">${esc(formatSize(f.size))}</div>`;
              if (f.data && f.data.startsWith("data:image/")) {
                const img = document.createElement("img");
                img.className = "file-preview";
                img.src = f.data;
                img.alt = f.name;
                card.appendChild(img);
              }
              grid.appendChild(card);
            });
            block.appendChild(grid);
          } else {
            block.innerHTML += `<div class="q-answer" style="color:var(--muted)">${Array.isArray(val) ? val.map(v=>esc(v.name)).join(", ") : "未上传文件"}</div>`;
          }
        } else if (q.type === "radio" || q.type === "input") {
          block.innerHTML += `<div class="q-answer">${esc(val ?? "（未作答）")}</div>`;
        } else if (q.type === "checkbox") {
          const arr = Array.isArray(val) ? val : [];
          if (arr.length) {
            const wrap = document.createElement("div");
            wrap.className = "q-answer multi";
            arr.forEach(v => {
              const item = document.createElement("div");
              item.className = "item";
              item.textContent = "▸ " + v;
              wrap.appendChild(item);
            });
            block.appendChild(wrap);
          } else {
            block.innerHTML += `<div class="q-answer" style="color:var(--muted)">（未选择）</div>`;
          }
        } else if (q.type === "textarea") {
          block.innerHTML += `<div class="q-answer">${esc(val ?? "（未作答）")}</div>`;
        }

        sec.appendChild(block);
      });

      resultEl.appendChild(sec);
    });
  } else {
    // No questions.js loaded — fallback: list all data keys
    const sec = document.createElement("div");
    sec.className = "section";
    sec.innerHTML = `<div class="section-title">§ 题目数据</div>`;
    for (const [key, val] of Object.entries(data)) {
      if (key.startsWith("_") || key === "applicant") continue;
      const block = document.createElement("div");
      block.className = "q-block";
      block.innerHTML = `<div class="q-text" style="font-family:var(--mono);font-size:0.72rem;color:var(--muted)">${esc(key)}</div><div class="q-answer">${esc(JSON.stringify(val, null, 2))}</div>`;
      sec.appendChild(block);
    }
    resultEl.appendChild(sec);
  }

  // Raw data link (for debugging)
  const raw = document.createElement("div");
  raw.className = "section";
  raw.style.textAlign = "center";
  const rawBtn = document.createElement("button");
  rawBtn.textContent = "查看原始 JSON";
  Object.assign(rawBtn.style, {
    fontFamily: "var(--mono)", fontSize: "0.72rem",
    background: "transparent", border: "1px solid var(--line)",
    color: "var(--sub)", padding: "8px 24px", cursor: "pointer",
    letterSpacing: "0.08em",
  });
  rawBtn.onmouseenter = () => { rawBtn.style.borderColor = "#fff"; rawBtn.style.color = "#fff"; };
  rawBtn.onmouseleave = () => { rawBtn.style.borderColor = ""; rawBtn.style.color = ""; };
  rawBtn.onclick = () => {
    const w = window.open("", "_blank");
    w.document.write("<pre style='background:#000;color:#0f0;padding:20px;font-size:13px;'>" + esc(JSON.stringify(data, null, 2)) + "</pre>");
    w.document.close();
  };
  raw.appendChild(rawBtn);
  resultEl.appendChild(raw);

  // Scroll to top
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// ── Helpers ──────────────────────────────────────────
function esc(s) {
  if (s == null) return "";
  const d = document.createElement("div");
  d.textContent = String(s);
  return d.innerHTML;
}

function formatTime(iso) {
  if (!iso) return "—";
  try {
    const d = new Date(iso);
    return d.toLocaleString("zh-CN", { timeZone: "Asia/Shanghai" });
  } catch { return iso; }
}

function formatSize(bytes) {
  if (!bytes) return "0 B";
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + " KB";
  return (bytes/(1024*1024)).toFixed(1) + " MB";
}
</script>

</body>
</html>
